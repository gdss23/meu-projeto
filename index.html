<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BinaryPro Cloud</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://unpkg.com/lightweight-charts@4.0.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { font-size: 20px; font-weight: bold; color: #58a6ff; }
        .chart-container { width: 100%; height: 300px; margin-bottom: 10px; border-radius: 8px; overflow: hidden; }
        .trade-buttons { display: flex; gap: 10px; margin: 10px 0; }
        .btn-call, .btn-put { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; }
        .btn-call { background: #238636; }
        .btn-put { background: #da3633; }
        .timer { text-align: center; font-size: 28px; margin: 8px 0; }
        .config { background: #161b22; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .config input, .config select { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 10px; border-radius: 6px; margin-top: 6px; }
        .log { max-height: 120px; overflow-y: auto; background: #0d1117; padding: 8px; border-radius: 6px; font-family: monospace; font-size: 11px; margin-top: 10px; }
        .switch { display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">BinaryPro Cloud</div>
        <span>🤖 <span id="robotStatus">OFF</span></span>
    </div>
    <div class="chart-container" id="chart"></div>
    <div class="trade-buttons">
        <button class="btn-call" onclick="executeTrade('CALL')">📈 CALL</button>
        <button class="btn-put" onclick="executeTrade('PUT')">📉 PUT</button>
    </div>
    <div class="timer" id="timer">--:--</div>
    <div class="config">
        <div>🔌 Corretora</div>
        <select id="brokerSelect">
            <option value="quotex">Quotex</option>
            <option value="pocketoption">Pocket Option</option>
            <option value="binance">Binance (em breve)</option>
        </select>
        <input type="email" id="email" placeholder="E-mail da corretora">
        <input type="password" id="password" placeholder="Senha">
        <select id="pairSelect">
            <option value="BTCUSDT">BTC/USDT</option>
            <option value="ETHUSDT">ETH/USDT</option>
        </select>
        <select id="expirySelect">
            <option value="1">M1</option>
            <option value="5">M5</option>
        </select>
        <input type="number" id="amount" value="10" placeholder="Valor em USDT">
        <div class="switch" style="margin-top:8px;">
            <label>🤖 Robô Automático</label>
            <input type="checkbox" id="autoTrade" onchange="toggleAutoTrade()">
        </div>
    </div>
    <div class="log" id="log"></div>

    <script>
        // ========== CÓDIGO COMPLETO DO SEU APP (SEM DUPLICAÇÃO) ==========
        let chart, candleSeries, ema9Series, ema21Series, bollUpper, bollLower;
        let tradeActive = false, expiryTime, timerInterval;
        let autoTradeEnabled = false;
        let currentPrice = 0;
        let ws;

        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.type = type === 'CALL' ? 'square' : 'triangle';
                osc.frequency.value = type === 'CALL' ? 880 : 440;
                osc.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch(e) {}
        }

        const container = document.getElementById('chart');
        chart = LightweightCharts.createChart(container, {
            width: container.clientWidth,
            height: 300,
            layout: { background: { color: '#0d1117' }, textColor: '#c9d1d9' },
            grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } }
        });
        candleSeries = chart.addCandlestickSeries({
            upColor: '#238636', downColor: '#da3633',
            borderUpColor: '#238636', borderDownColor: '#da3633',
            wickUpColor: '#238636', wickDownColor: '#da3633'
        });
        ema9Series = chart.addLineSeries({ color: '#fbbf24', lineWidth: 1 });
        ema21Series = chart.addLineSeries({ color: '#60a5fa', lineWidth: 1 });
        bollUpper = chart.addLineSeries({ color: '#a78bfa', lineWidth: 1, lineStyle: 2 });
        bollLower = chart.addLineSeries({ color: '#a78bfa', lineWidth: 1, lineStyle: 2 });

        function calcEMA(data, period) {
            if (data.length < period) return null;
            const k = 2 / (period + 1);
            let ema = data.slice(0, period).reduce((a, b) => a + b, 0) / period;
            const result = [ema];
            for (let i = period; i < data.length; i++) {
                ema = data[i] * k + ema * (1 - k);
                result.push(ema);
            }
            return result;
        }

        function calcBollingerBands(data, period, mult) {
            if (data.length < period) return null;
            const upper = [], lower = [];
            for (let i = period - 1; i < data.length; i++) {
                const slice = data.slice(i - period + 1, i + 1);
                const mean = slice.reduce((a, b) => a + b, 0) / period;
                const variance = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / period;
                const std = Math.sqrt(variance);
                upper.push(mean + mult * std);
                lower.push(mean - mult * std);
            }
            return { upper, lower };
        }

        function updateIndicators() {
            const data = candleSeries.data();
            if (!data || data.length < 20) return;
            const closes = data.map(c => c.close);
            const times = data.map(c => c.time);
            const ema9 = calcEMA(closes, 9);
            const ema21 = calcEMA(closes, 21);
            if (ema9) ema9Series.setData(ema9.map((v, i) => ({ time: times[i], value: v })));
            if (ema21) ema21Series.setData(ema21.map((v, i) => ({ time: times[i], value: v })));
            const bb = calcBollingerBands(closes, 20, 2);
            if (bb) {
                bollUpper.setData(bb.upper.map((v, i) => ({ time: times[i], value: v })));
                bollLower.setData(bb.lower.map((v, i) => ({ time: times[i], value: v })));
            }
        }

        function connectWebSocket() {
            ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_1m');
            ws.onopen = () => log('Conectado ao feed de preços.');
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (!data.k) return;
                const kline = data.k;
                const newCandle = {
                    time: Math.floor(kline.t / 1000),
                    open: parseFloat(kline.o),
                    high: parseFloat(kline.h),
                    low: parseFloat(kline.l),
                    close: parseFloat(kline.c)
                };
                candleSeries.update(newCandle);
                currentPrice = newCandle.close;
                updateIndicators();
                if (autoTradeEnabled && !tradeActive) autoAnalyze();
                if (tradeActive) updateTimer();
            };
            ws.onerror = () => log('Erro no WebSocket.');
            ws.onclose = () => {
                log('WebSocket fechado. Reconectando em 5s...');
                setTimeout(connectWebSocket, 5000);
            };
        }

        function autoAnalyze() {
            const data = candleSeries.data();
            if (!data || data.length < 21) return;
            const closes = data.map(c => c.close);
            const ema9 = calcEMA(closes, 9);
            const ema21 = calcEMA(closes, 21);
            if (!ema9 || !ema21 || ema9.length < 2 || ema21.length < 2) return;
            const last9 = ema9[ema9.length-1], last21 = ema21[ema21.length-1];
            const prev9 = ema9[ema9.length-2], prev21 = ema21[ema21.length-2];
            let sinal = null;
            if (prev9 <= prev21 && last9 > last21) sinal = 'CALL';
            else if (prev9 >= prev21 && last9 < last21) sinal = 'PUT';
            if (!sinal) return;
            const bb = calcBollingerBands(closes, 20, 2);
            if (bb) {
                const lastUpper = bb.upper[bb.upper.length-1];
                const lastLower = bb.lower[bb.lower.length-1];
                if (currentPrice >= lastUpper || currentPrice <= lastLower) {
                    log('Sinal ' + sinal + ' ignorado (preço nas bandas).');
                    return;
                }
            }
            log('Sinal ' + sinal + ' detectado. Executando...');
            executeTrade(sinal);
        }

        async function executeTrade(action) {
            if (tradeActive) return;
            const broker = document.getElementById('brokerSelect').value;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!email || !password) { log('Preencha e-mail e senha.'); return; }
            const amount = parseFloat(document.getElementById('amount').value);
            const expiry = document.getElementById('expirySelect').value;
            if (!amount || amount <= 0) { log('Valor inválido.'); return; }
            playSound(action);
            log(`Ordem ${action} enviada (simulação).`);
            try {
                const response = await fetch('/api/trade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        broker,
                        credentials: { email, password },
                        trade: { pair: document.getElementById('pairSelect').value, action, amount, expiry }
                    })
                });
                const data = await response.json();
                if (data.success) log('Servidor respondeu: ' + data.message);
                else log('Erro do servidor: ' + data.message);
            } catch(e) {
                log('Servidor offline. Ordem local simulada.');
            }
            tradeActive = true;
            expiryTime = Date.now() + expiry * 60 * 1000;
            startTimer();
        }

        function startTimer() { timerInterval = setInterval(updateTimer, 200); }
        function updateTimer() {
            const diff = Math.max(0, expiryTime - Date.now());
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2, '0')}`;
            if (diff <= 0) {
                clearInterval(timerInterval);
                tradeActive = false;
                log('Operação encerrada.');
            }
        }

        function toggleAutoTrade() {
            autoTradeEnabled = document.getElementById('autoTrade').checked;
            document.getElementById('robotStatus').innerText = autoTradeEnabled ? 'LIGADO' : 'OFF';
            log(autoTradeEnabled ? 'Robô ativado.' : 'Robô desativado.');
        }

        function log(msg) {
            const el = document.getElementById('log');
            el.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + el.innerHTML;
        }

        fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100')
            .then(r => r.json())
            .then(data => {
                const candles = data.map(k => ({
                    time: Math.floor(k[0] / 1000),
                    open: parseFloat(k[1]),
                    high: parseFloat(k[2]),
                    low: parseFloat(k[3]),
                    close: parseFloat(k[4])
                }));
                candleSeries.setData(candles);
                updateIndicators();
                log('Painel pronto. Ative o robô.');
            });

        connectWebSocket();
    </script>

    <!-- Service Worker (obrigatório para instalação) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
                </html>
